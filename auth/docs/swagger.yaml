basePath: /api/v1
definitions:
  dao.ErrorBody:
    properties:
      code:
        example: INVALID_TOKEN
        type: string
      message:
        example: invalid or expired token
        type: string
    type: object
  dao.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/dao.ErrorBody'
    type: object
  dao.LoginRequest:
    properties:
      email:
        example: test@mail.com
        type: string
      password:
        example: "123456"
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  dao.RefreshRequest:
    properties:
      refresh_token:
        example: abc123
        type: string
    required:
    - refresh_token
    type: object
  dao.RegisterRequest:
    properties:
      email:
        example: test@mail.com
        type: string
      firstname:
        example: John
        type: string
      lastname:
        example: Doe
        type: string
      password:
        example: "123456"
        minLength: 6
        type: string
      username:
        example: john
        type: string
    required:
    - email
    - password
    - username
    type: object
  dao.TokenResponse:
    properties:
      access_token:
        example: jwt_token
        type: string
      refresh_token:
        example: refresh_token
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Auth service for image processing app
  title: Auth Service API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates user and returns access and refresh tokens
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dao.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dao.TokenResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/dao.ErrorResponse'
        "401":
          description: Wrong credentials
          schema:
            $ref: '#/definitions/dao.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/dao.ErrorResponse'
      summary: Login user
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes refresh token
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dao.RefreshRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/dao.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/dao.ErrorResponse'
      summary: Logout user
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Generates new access and refresh tokens using refresh token
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dao.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dao.TokenResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/dao.ErrorResponse'
        "401":
          description: Invalid or expired token
          schema:
            $ref: '#/definitions/dao.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/dao.ErrorResponse'
      summary: Refresh tokens
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account
      parameters:
      - description: User registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dao.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/dao.ErrorResponse'
        "409":
          description: User already exists
          schema:
            $ref: '#/definitions/dao.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/dao.ErrorResponse'
      summary: Register user
      tags:
      - auth
swagger: "2.0"
