services:
  # =====================
  # Zookeeper
  # =====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # =====================
  # Kafka
  # =====================
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  # =====================
  # Auth Postgres
  # =====================
  postgres-auth:
    image: postgres:15
    container_name: postgres-auth
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASS}
      POSTGRES_DB: ${AUTH_DB_NAME}
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
  # =====================
  # Image Postgres
  # =====================
  postgres-image:
    image: postgres:15
    container_name: postgres-image
    environment:
      POSTGRES_USER: ${IMAGE_DB_USER}
      POSTGRES_PASSWORD: ${IMAGE_DB_PASS}
      POSTGRES_DB: ${IMAGE_DB_NAME}
    volumes:
      - image_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5434:5432"
  # =====================
  # Auth Service
  # =====================
  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    container_name: auth
    depends_on:
      - postgres-auth
      - kafka
    env_file:
      - .env
    ports:
      - "8080:8080"

  # =====================
  # Image Service
  # =====================
  image:
    build:
      context: ./image
      dockerfile: Dockerfile
    container_name: image
    depends_on:
      - postgres-image
      - kafka
    env_file:
      - .env
    ports:
      - "8081:8080"

  # =====================
  # Processor Service
  # =====================
  processor:
    build:
      context: ./processor
      dockerfile: Dockerfile
    container_name: processor
    depends_on:
      - kafka
      - postgres-image
    env_file:
      - .env
    ports:
      - "8082:8080"

  # =====================
  # Migrate Service
  # =====================
  migrate:
    image: migrate/migrate:4
    container_name: migrate
    depends_on:
      - postgres-auth
      - postgres-image
    env_file:
      - .env
    entrypoint: ["sleep", "infinity"] # оставляем в фоне
    volumes:
      - ./auth/migrations:/migrations/auth
      - ./image/migrations:/migrations/image

# =====================
# Volumes
# =====================
volumes:
  auth_db_data:
  image_db_data:
