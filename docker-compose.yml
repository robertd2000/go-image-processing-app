version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres-auth:
    image: postgres:15
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASS}
      POSTGRES_DB: ${AUTH_DB_NAME}
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER}"]
      interval: 5s
      retries: 5
    ports:
      - "5433:5432"

  postgres-user:
    image: postgres:15
    environment:
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASS}
      POSTGRES_DB: ${USER_DB_NAME}
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USER}"]
      interval: 5s
      retries: 5
    ports:
      - "5434:5432"

  postgres-image:
    image: postgres:15
    environment:
      POSTGRES_USER: ${IMAGE_DB_USER}
      POSTGRES_PASSWORD: ${IMAGE_DB_PASS}
      POSTGRES_DB: ${IMAGE_DB_NAME}
    volumes:
      - image_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${IMAGE_DB_USER}"]
      interval: 5s
      retries: 5
    ports:
      - "5435:5432"

  auth:
    build: ./auth
    depends_on:
      postgres-auth:
        condition: service_healthy
      kafka:
        condition: service_started
    env_file:
      - .env
    ports:
      - "8080:8080"

  image:
    build: ./image
    depends_on:
      postgres-image:
        condition: service_healthy
      kafka:
        condition: service_started
    env_file:
      - .env
    ports:
      - "8081:8080"

  processor:
    build: ./processor
    depends_on:
      postgres-image:
        condition: service_healthy
      kafka:
        condition: service_started
    env_file:
      - .env
    ports:
      - "8082:8080"

  migrate:
    image: migrate/migrate:4
    depends_on:
      postgres-auth:
        condition: service_healthy
      postgres-user:
        condition: service_healthy
      postgres-image:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: ["sleep", "infinity"]
    volumes:
      - ./auth/migrations:/migrations/auth
      - ./user/migrations:/migrations/user
      - ./image/migrations:/migrations/image

volumes:
  auth_db_data:
  user_db_data:
  image_db_data:
